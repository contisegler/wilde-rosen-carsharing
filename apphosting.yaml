# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Build configuration
# See https://firebase.google.com/docs/app-hosting/configure#build
buildConfig:
  runtime: nodejs22
  installCommand: pnpm install --prod=false
  buildCommand: pnpm run build

